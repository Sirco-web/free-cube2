<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeCube2 - Minecraft Clone with Sirco Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      background: #070b12;
      color: #fff;
      font-family: "Trebuchet MS", Arial, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      outline: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" aria-label="FreeCube2 game canvas"></canvas>
  <script type="module" src="./index.js?game=./freecube2-game.js"></script>
</body>
</html>
